<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yomi Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 200px; flex-shrink: 0; border-right: 2px solid var(--border); padding: 20px 12px; box-sizing: border-box; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sidebar-brand { font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; color: var(--ink); margin-bottom: 18px; padding: 0 8px; }
    .side-nav { display: flex; flex-direction: column; gap: 6px; }
    .side-nav .tab-btn { text-align: left; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .nav-count { font-size: 0.68rem; color: var(--text-muted); }
    .tab-btn.active .nav-count { color: inherit; }
    .main-area { flex: 1; min-width: 0; max-width: 1100px; padding: 24px; box-sizing: border-box; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .admin-header h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--ink); margin: 0; }
    @media (max-width: 720px) {
      .admin-layout { flex-direction: column; }
      .sidebar { width: auto; height: auto; position: static; display: flex; align-items: center; border-right: none; border-bottom: 2px solid var(--border); overflow-x: auto; padding: 10px 12px; }
      .sidebar-brand { margin: 0 12px 0 0; font-size: 0.9rem; white-space: nowrap; }
      .side-nav { flex-direction: row; }
      .side-nav .tab-btn { white-space: nowrap; }
      .main-area { padding: 16px; }
    }
    .tab-btn { font-family: var(--font-mono); font-size: 0.8rem; padding: 6px 14px; border: 2px solid var(--border); background: var(--paper); color: var(--ink); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; }
    .tab-btn:hover { border-color: var(--ink); }
    .tab-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
    .toolbar input { flex: 1; font-family: var(--font-mono); font-size: 0.85rem; padding: 8px 12px; border: 2px solid var(--border); background: var(--paper); color: var(--ink); border-radius: var(--radius-sm); outline: none; }
    .toolbar input:focus { border-color: var(--ink); }
    .doc-list { display: flex; flex-direction: column; gap: 8px; }
    .doc-item { border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--paper); box-shadow: 2px 2px 0 var(--border); }
    .doc-item:hover { border-color: var(--ink); }
    .doc-id { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 500; color: var(--ink); cursor: pointer; }
    .doc-id:hover { text-decoration: underline; }
    .doc-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .doc-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-view { font-size: 0.78rem; padding: 4px 10px; border: 2px solid var(--border); background: var(--surface); color: var(--ink); border-radius: 4px; cursor: pointer; }
    .btn-view:hover { border-color: var(--ink); }
    .btn-del { font-size: 0.78rem; padding: 4px 10px; border: 2px solid var(--chile); background: transparent; color: var(--chile); border-radius: 4px; cursor: pointer; }
    .btn-del:hover { background: var(--chile); color: #fff; }
    .load-more { margin-top: 16px; text-align: center; }
    .empty-msg { text-align: center; color: var(--text-muted); font-size: 0.9rem; padding: 40px 0; font-family: var(--font-mono); }
    /* Login overlay */
    #login-overlay { position: fixed; inset: 0; background: var(--paper); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .login-box { width: 320px; border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 32px; box-shadow: 4px 4px 0 var(--border); }
    .login-box h2 { font-family: var(--font-display); margin: 0 0 20px; font-size: 1.3rem; }
    .login-box input { width: 100%; box-sizing: border-box; font-family: var(--font-mono); font-size: 0.9rem; padding: 10px 12px; border: 2px solid var(--border); background: var(--surface); color: var(--ink); border-radius: var(--radius-sm); outline: none; margin-bottom: 12px; }
    .login-box input:focus { border-color: var(--ink); }
    .login-error { color: var(--chile); font-size: 0.8rem; margin-bottom: 10px; min-height: 1.2em; }
    /* Modal */
    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
    #modal-overlay.open { display: flex; }
    .modal-box { background: var(--paper); border: 2px solid var(--border); border-radius: var(--radius-sm); box-shadow: 4px 4px 0 var(--border); max-width: 700px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 2px solid var(--border); }
    .modal-header span { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 500; }
    .modal-close { cursor: pointer; font-size: 1.2rem; color: var(--text-muted); background: none; border: none; line-height: 1; }
    .modal-body { overflow-y: auto; padding: 16px 18px; }
    .modal-body pre { font-family: var(--font-mono); font-size: 0.78rem; white-space: pre-wrap; word-break: break-all; margin: 0; color: var(--ink); }
    .stats-bar { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); margin-bottom: 12px; }
    /* Logs table */
    .log-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .log-table th { font-family: var(--font-mono); font-weight: 600; text-align: left; padding: 8px 10px; background: var(--surface); border-bottom: 2px solid var(--border); color: var(--ink); white-space: nowrap; }
    .log-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--ink); vertical-align: top; }
    .log-table tr:hover td { background: var(--surface); }
    .log-table .mono { font-family: var(--font-mono); }
    .log-table .del-log { font-size: 0.72rem; padding: 2px 7px; border: 1px solid var(--border); background: none; color: var(--text-muted); border-radius: 3px; cursor: pointer; }
    .log-table .del-log:hover { border-color: var(--chile); color: var(--chile); }
    .barcode-link { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--border); }
    .barcode-link:hover { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }
    .log-badge { display: inline-block; font-size: 0.68rem; font-weight: 600; border-radius: 3px; padding: 1px 5px; vertical-align: middle; margin-left: 3px; border: 1px solid; }
    .log-badge-red    { background: var(--chile-light); color: var(--chile); border-color: var(--chile-border); }
    .log-badge-blue   { background: #e8f0fe; color: #1a56c4; border-color: #a8c0f0; }
    .log-badge-orange { background: #fff3e0; color: #b45309; border-color: #fcd49a; }
    /* Cache tab */
    .cache-section { margin-bottom: 24px; }
    .cache-section h3 { font-family: var(--font-display); font-size: 1rem; color: var(--ink); margin: 0 0 12px; }
    .cache-badge { display: inline-block; font-size: 0.68rem; font-weight: 600; border-radius: 3px; padding: 1px 5px; vertical-align: middle; margin-left: 3px; border: 1px solid; }
    .cache-badge-l1 { background: #e8f0fe; color: #1a56c4; border-color: #a8c0f0; }
    .cache-badge-l2 { background: #d4edda; color: #155724; border-color: #c3e6cb; }
    .cache-badge-both { background: #e8d4f0; color: #6c3483; border-color: #d2b4de; }
    .cache-source { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); }
    /* Confidence tooltip */
    .conf-wrap { position: relative; display: inline-block; cursor: help; }
    .conf-tooltip {
      display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%); background: var(--ink); color: #fff;
      border-radius: 6px; padding: 10px 14px; width: 260px; font-size: 0.78rem;
      line-height: 1.5; z-index: 20; white-space: normal; pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
    .conf-tooltip::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 6px solid transparent; border-top-color: var(--ink);
    }
    .conf-wrap:hover .conf-tooltip { display: block; }
    .conf-tooltip-level { font-weight: 700; margin-bottom: 4px; }
    .conf-tooltip-notes { color: rgba(255,255,255,0.75); }
    /* Resumen */
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-card { border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--paper); box-shadow: 2px 2px 0 var(--border); padding: 14px; }
    .stat-card .num { font-family: var(--font-mono); font-size: 1.6rem; font-weight: 600; color: var(--ink); }
    .stat-card .lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    .stats-h { font-family: var(--font-display); font-size: 1rem; color: var(--ink); margin: 20px 0 10px; }
    .chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--paper); padding: 10px; box-sizing: border-box; }
    .chart .bar { flex: 1; background: var(--green); min-height: 2px; border-radius: 2px 2px 0 0; }
    .stats-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 720px) { .stats-cols { grid-template-columns: 1fr; } }
    .bk-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.8rem; color: var(--ink); }
    .bk-key { width: 80px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bk-bar { flex: 1; height: 10px; background: var(--surface); border-radius: 3px; overflow: hidden; }
    .bk-bar span { display: block; height: 100%; background: var(--green); }
    .bk-n { font-family: var(--font-mono); font-size: 0.75rem; width: 36px; text-align: right; }
  </style>
</head>
<body style="background:var(--paper);min-height:100vh;">

<div id="login-overlay">
  <div class="login-box">
    <h2>Yomi Admin</h2>
    <input id="token-input" type="password" placeholder="Token de acceso" autocomplete="current-password">
    <div class="login-error" id="login-error"></div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;">Entrar</button>
  </div>
</div>

<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modal-title"></span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <pre id="modal-content"></pre>
    </div>
  </div>
</div>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">Yomi Admin</div>
    <nav class="side-nav" id="tabs">
      <button class="tab-btn active" data-col="resumen">📊 Resumen</button>
      <button class="tab-btn" data-col="scan_logs">📋 Logs <span class="nav-count" data-count="scan_logs"></span></button>
      <button class="tab-btn" data-col="reports">🚩 Reportes <span class="nav-count" data-count="reports"></span></button>
      <button class="tab-btn" data-col="products_ocr">📷 OCR <span class="nav-count" data-count="products_ocr"></span></button>
      <button class="tab-btn" data-col="products_nutrition">📊 Nutrición <span class="nav-count" data-count="products_nutrition"></span></button>
      <button class="tab-btn" data-col="cache">💾 Cache <span class="nav-count" data-count="cache"></span></button>
    </nav>
  </aside>
  <main class="main-area">
    <div class="admin-header">
      <h1 id="section-title">Resumen</h1>
      <button class="btn" id="logout-btn" style="font-size:0.8rem;padding:6px 12px;">Cerrar sesión</button>
    </div>
    <div class="toolbar" id="toolbar">
      <input id="filter-input" type="text" placeholder="Filtrar por ID / código de barras…">
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="doc-list" id="doc-list"></div>
    <div class="load-more" id="load-more"></div>
  </main>
</div>

<script src="/admin/admin.js"></script>
</body>
</html>
