<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Yomi — ¿Puedo comerlo?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="home.css?v=2">
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <img src="assets/redesign/logo.svg" alt="Yomi" class="app-logo">
    </header>

    <!-- Scrollable main -->
    <main class="app-main">

      <!-- Heading -->
      <section class="section-heading">
        <h1 class="heading-title">¿Puedo comerlo?</h1>
        <p class="heading-sub">Escanea y lo sabrás en segundos.</p>
      </section>

      <!-- Scan CTA -->
      <section class="section-scan">
        <button class="scan-cta" id="btn-scan">
          <div class="scan-cta-icon-wrap">
            <img src="assets/redesign/icon-camera.svg" alt="" class="scan-cta-icon">
          </div>
          <div class="scan-cta-text">
            <span class="scan-cta-title">Escanear código de barras</span>
            <span class="scan-cta-sub">Apunta a cualquier producto</span>
          </div>
        </button>
      </section>

      <!-- Recent products -->
      <section class="section-recent">
        <div class="section-recent-header">
          <h2 class="recent-title">Productos recientes</h2>
          <a href="scan.html" class="btn-ver-todos">Ver todos</a>
        </div>
        <div class="products-grid" id="products-grid">
          <!-- filled by home.js -->
        </div>
        <div class="products-empty hidden" id="products-empty">
          <p>Aún no has escaneado ningún producto.</p>
        </div>
      </section>

      <!-- Yomi+ promo -->
      <section class="section-promo">
        <div class="promo-card">
          <div class="promo-card-text">
            <p class="promo-title">Activa Yomi+</p>
            <p class="promo-sub">Perfil IA · OCR · Historial · Agente personalizado</p>
          </div>
          <div class="promo-btn-wrap">
            <button class="promo-btn" disabled>Próximamente · $29 al mes</button>
          </div>
        </div>
      </section>

      <!-- Stats -->
      <section class="section-stats">
        <div class="stat-card">
          <p class="stat-value">3M+</p>
          <p class="stat-label">Productos</p>
        </div>
        <div class="stat-card">
          <p class="stat-value">OFF + USDA</p>
          <p class="stat-label">Bases de datos</p>
        </div>
        <div class="stat-card">
          <p class="stat-value">OCR + IA</p>
          <p class="stat-label">Análisis</p>
        </div>
      </section>

    </main>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" aria-label="Inicio">
        <img src="assets/redesign/icon-home.svg" alt="" class="nav-icon">
        <span class="nav-label">Inicio</span>
      </button>
      <button class="nav-item" id="nav-scan" aria-label="Escanear">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 4H8a4 4 0 0 0-4 4v1M9 20H8a4 4 0 0 1-4-4v-1M15 4h1a4 4 0 0 1 4 4v1M15 20h1a4 4 0 0 0 4-4v-1"/>
        </svg>
        <span class="nav-label nav-label-muted">Escanear</span>
      </button>
      <button class="nav-item nav-disabled" aria-label="Análisis" aria-disabled="true">
        <img src="assets/redesign/icon-analysis.svg" alt="" class="nav-icon">
        <span class="nav-label nav-label-muted">Análisis</span>
      </button>
      <button class="nav-item nav-disabled" aria-label="Perfil" aria-disabled="true">
        <img src="assets/redesign/icon-profile.svg" alt="" class="nav-icon">
        <span class="nav-label nav-label-muted">Perfil</span>
      </button>
    </nav>

  </div>
  <script src="home.js"></script>
</body>
</html>
